<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Portfolio Tracker — 利確・損切管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=IBM+Plex+Sans+JP:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #16181d;
    --bg-elevated:   #1e2028;
    --bg-card:       #22252e;
    --bg-input:      #2a2d38;
    --ink:           #e8e6e0;
    --ink-soft:      #9a98a0;
    --ink-muted:     #5a5860;
    --line:          #2e3040;
    --line-soft:     #262830;
    --profit:        rgba(160, 60, 60, 0.18);
    --profit-border: rgba(200, 80, 80, 0.35);
    --profit-ink:    #f08080;
    --loss:          rgba(50, 90, 160, 0.18);
    --loss-border:   rgba(70, 120, 200, 0.35);
    --loss-ink:      #7aaef0;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
color-scheme: dark;
background: #16181d;
color: #e8e6e0;
font-family: ‘IBM Plex Sans JP’, -apple-system, sans-serif;
font-weight: 400;
line-height: 1.6;
-webkit-font-smoothing: antialiased;
min-height: 100vh;
}

html { background: #16181d; }

body {
background: #16181d;
background-image:
radial-gradient(ellipse at 10% 0%, rgba(80, 60, 130, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 90% 100%, rgba(30, 80, 140, 0.10) 0%, transparent 50%);
}

.container {
max-width: 1100px;
margin: 0 auto;
padding: 48px 32px 80px;
}

/* ヘッダー */
header {
display: flex;
justify-content: space-between;
align-items: flex-end;
padding-bottom: 32px;
border-bottom: 1px solid #2e3040;
margin-bottom: 40px;
}

.brand-mark {
font-family: ‘Fraunces’, serif;
font-weight: 300;
font-size: 12px;
letter-spacing: 0.3em;
text-transform: uppercase;
color: #5a5860;
margin-bottom: 8px;
}

h1 {
font-family: ‘Fraunces’, serif;
font-weight: 400;
font-size: clamp(2rem, 4vw, 2.8rem);
letter-spacing: -0.02em;
line-height: 1.05;
color: #e8e6e0;
}

h1 em {
font-style: italic;
font-weight: 300;
color: #9a98a0;
}

.date-stamp {
font-family: ‘JetBrains Mono’, monospace;
font-size: 12px;
color: #5a5860;
letter-spacing: 0.05em;
text-align: right;
}

/* サマリーカード */
.summary {
display: grid;
grid-template-columns: repeat(3, 1fr);
background: #22252e;
border: 1px solid #2e3040;
margin-bottom: 40px;
}

.summary-item {
padding: 22px 24px;
border-right: 1px solid #2e3040;
}

.summary-item:last-child { border-right: none; }

.summary-label {
font-size: 10px;
letter-spacing: 0.14em;
text-transform: uppercase;
color: #5a5860;
margin-bottom: 6px;
}

.summary-value {
font-family: ‘Fraunces’, serif;
font-size: 26px;
font-weight: 400;
letter-spacing: -0.01em;
color: #e8e6e0;
}

.summary-value.positive { color: #f08080; }
.summary-value.negative { color: #7aaef0; }

/* フォーム */
.form-section {
background: #22252e;
border: 1px solid #2e3040;
padding: 28px 32px;
margin-bottom: 32px;
position: relative;
}

.form-section::before {
content: ‘’;
position: absolute;
top: -1px; left: -1px;
width: 20px; height: 20px;
border-top: 2px solid #e8e6e0;
border-left: 2px solid #e8e6e0;
}

.form-title {
font-family: ‘Fraunces’, serif;
font-size: 16px;
font-weight: 500;
margin-bottom: 20px;
color: #9a98a0;
display: flex;
align-items: center;
gap: 10px;
}

.form-title::before {
content: ‘+’;
font-size: 22px;
font-weight: 300;
color: #5a5860;
}

.form-grid {
display: grid;
grid-template-columns: 2fr 1fr 1fr 1fr auto;
gap: 16px;
align-items: end;
}

.field label {
display: block;
font-size: 10px;
letter-spacing: 0.1em;
text-transform: uppercase;
color: #5a5860;
margin-bottom: 8px;
}

.field input {
width: 100%;
border: none;
border-bottom: 1px solid #2e3040;
background: transparent;
padding: 8px 0;
font-size: 16px;
font-family: inherit;
color: #e8e6e0;
transition: border-color 0.2s;
}

.field input:focus {
outline: none;
border-bottom-color: #9a98a0;
}

.field input[type=“number”] {
font-family: ‘JetBrains Mono’, monospace;
}

button.primary {
-webkit-appearance: none;
appearance: none;
background: #3a3d4a;
color: #e8e6e0;
border: none;
padding: 10px 24px;
font-size: 12px;
letter-spacing: 0.1em;
text-transform: uppercase;
font-family: inherit;
cursor: pointer;
transition: background 0.2s;
white-space: nowrap;
}

button.primary:hover { background: #4a4e60; }
button.primary:active { opacity: 0.8; }

/* 凡例 */
.legend {
display: flex;
gap: 20px;
margin-bottom: 16px;
font-size: 12px;
color: #9a98a0;
flex-wrap: wrap;
align-items: center;
}

.legend-item {
display: flex;
align-items: center;
gap: 7px;
}

.swatch {
width: 12px; height: 12px;
border: 1px solid;
display: inline-block;
flex-shrink: 0;
}

.swatch.profit { background: rgba(160,60,60,0.18); border-color: rgba(200,80,80,0.35); }
.swatch.loss   { background: rgba(50,90,160,0.18); border-color: rgba(70,120,200,0.35); }

/* テーブル */
.table-wrap {
background: #22252e;
border: 1px solid #2e3040;
overflow-x: auto;
}

table {
width: 100%;
border-collapse: collapse;
min-width: 720px;
}

thead th {
text-align: left;
padding: 14px 16px;
font-size: 10px;
letter-spacing: 0.12em;
text-transform: uppercase;
color: #5a5860;
font-weight: 500;
border-bottom: 1px solid #2e3040;
background: #1e2028;
}

thead th.num { text-align: right; }

tbody td {
border-bottom: 1px solid #262830;
vertical-align: middle;
padding: 0;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background-color 0.3s; }

tbody tr.profit-row { background: rgba(160,60,60,0.18); }
tbody tr.profit-row td:first-child { border-left: 3px solid rgba(200,80,80,0.55); }

tbody tr.loss-row { background: rgba(50,90,160,0.18); }
tbody tr.loss-row td:first-child { border-left: 3px solid rgba(70,120,200,0.55); }

/* セル内パディング（spanで統一） */
.cell-pad {
display: flex;
align-items: center;
padding: 16px;
}

.cell-right {
justify-content: flex-end;
}

.ticker {
font-family: ‘Fraunces’, serif;
font-size: 16px;
font-weight: 500;
}

/* インライン編集セル */
.editable-cell { cursor: pointer; }

.editable-cell .cell-pad {
justify-content: flex-end;
gap: 6px;
}

.edit-icon {
opacity: 0;
font-size: 10px;
color: #5a5860;
transition: opacity 0.15s;
flex-shrink: 0;
user-select: none;
}

.editable-cell:hover .edit-icon,
.editable-cell:focus .edit-icon { opacity: 1; }

.val {
font-family: ‘JetBrains Mono’, monospace;
font-variant-numeric: tabular-nums;
font-size: 13px;
}

.inline-input {
display: none;
width: 100%;
background: #2a2d38;
border: 1px solid #9a98a0;
color: #e8e6e0;
font-family: ‘JetBrains Mono’, monospace;
font-size: 16px;
padding: 8px 12px;
outline: none;
text-align: right;
margin: 4px 12px;
box-sizing: border-box;
width: calc(100% - 24px);
}

.editable-cell.editing .cell-pad  { display: none; }
.editable-cell.editing .inline-input { display: block; }

/* 損益率バッジ */
.pct {
font-family: ‘JetBrains Mono’, monospace;
font-size: 12px;
padding: 3px 8px;
border: 1px solid #2e3040;
display: inline-block;
min-width: 68px;
text-align: center;
}

.pct.up   { background: rgba(160,60,60,0.18); color: #f08080; border-color: rgba(200,80,80,0.35); }
.pct.down { background: rgba(50,90,160,0.18); color: #7aaef0; border-color: rgba(70,120,200,0.35); }

.status {
font-size: 10px;
letter-spacing: 0.08em;
text-transform: uppercase;
color: #5a5860;
}

.status.alert-profit { color: #f08080; font-weight: 600; }
.status.alert-loss   { color: #7aaef0; font-weight: 600; }

/* 削除ボタン */
.action-cell {
padding: 0 12px;
text-align: right;
white-space: nowrap;
}

button.icon-btn {
-webkit-appearance: none;
appearance: none;
background: transparent;
border: 1px solid #2e3040;
color: #5a5860;
width: 28px; height: 28px;
cursor: pointer;
font-size: 14px;
transition: all 0.2s;
display: inline-flex;
align-items: center;
justify-content: center;
}

button.icon-btn:hover {
border-color: #9a98a0;
color: #e8e6e0;
}

/* empty state */
.empty {
padding: 70px 20px;
text-align: center;
color: #5a5860;
}

.empty-mark {
font-family: ‘Fraunces’, serif;
font-style: italic;
font-size: 20px;
margin-bottom: 6px;
color: #9a98a0;
}

.empty-sub { font-size: 13px; }

/* フッター */
footer {
margin-top: 40px;
padding-top: 20px;
border-top: 1px solid #2e3040;
display: flex;
justify-content: space-between;
font-size: 10px;
letter-spacing: 0.1em;
text-transform: uppercase;
color: #5a5860;
}

/* アニメーション */
@keyframes fadeIn {
from { opacity: 0; transform: translateY(3px); }
to   { opacity: 1; transform: translateY(0); }
}

tbody tr { animation: fadeIn 0.25s ease-out; }

.table-wrap::-webkit-scrollbar { height: 6px; }
.table-wrap::-webkit-scrollbar-track { background: #1e2028; }
.table-wrap::-webkit-scrollbar-thumb { background: #5a5860; }

/* ===== モバイル ===== */
@media (max-width: 720px) {
.container { padding: 24px 14px 60px; }

```
header { flex-direction: column; align-items: flex-start; gap: 6px; }
.date-stamp { text-align: left; }

.summary-item  { padding: 14px 10px; }
.summary-value { font-size: 20px; }
.summary-label { font-size: 9px; }

.form-section { padding: 18px 14px; }

.form-grid {
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-grid .field:first-child  { grid-column: 1 / -1; }
.form-grid button.primary {
  grid-column: 1 / -1;
  width: 100%;
  padding: 13px;
}
```

}
</style>

</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="brand-mark">Portfolio Tracker</div>
      <h1>利確・損切 <em>Monitor</em></h1>
    </div>
    <div class="date-stamp" id="dateStamp"></div>
  </header>

  <section class="summary">
    <div class="summary-item">
      <div class="summary-label">Holdings</div>
      <div class="summary-value" id="sumCount">0</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Take Profit (+20%)</div>
      <div class="summary-value positive" id="sumProfit">0</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Stop Loss (−7%)</div>
      <div class="summary-value negative" id="sumLoss">0</div>
    </div>
  </section>

  <section class="form-section">
    <div class="form-title">新規登録</div>
    <div id="stockForm" class="form-grid">
      <div class="field">
        <label for="name">銘柄名 / Ticker</label>
        <input type="text" id="name" placeholder="例：トヨタ自動車">
      </div>
      <div class="field">
        <label for="buyPrice">取得単価</label>
        <input type="number" id="buyPrice" step="0.01" min="0.01" placeholder="0.00">
      </div>
      <div class="field">
        <label for="currentPrice">現在株価</label>
        <input type="number" id="currentPrice" step="0.01" min="0.01" placeholder="0.00">
      </div>
      <div class="field">
        <label for="shares">保有株数</label>
        <input type="number" id="shares" step="1" min="1" placeholder="100（省略可）">
      </div>
      <button type="button" id="addBtn" class="primary">追加</button>
    </div>
  </section>

  <div class="legend">
    <div class="legend-item"><span class="swatch profit"></span>利確ライン（+20%超）</div>
    <div class="legend-item"><span class="swatch loss"></span>損切ライン（−7%下回）</div>
    <div class="legend-item" style="color:#5a5860;font-size:11px;">✎ 数値をタップ／クリックで直接編集できます</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>銘柄</th>
          <th class="num">取得単価</th>
          <th class="num">現在株価</th>
          <th class="num">保有株数</th>
          <th class="num">損益率</th>
          <th>ステータス</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="stockBody"></tbody>
    </table>
    <div id="emptyState" class="empty" style="display:none;">
      <div class="empty-mark">— No holdings yet —</div>
      <div class="empty-sub">上のフォームから最初の銘柄を登録してください</div>
    </div>
  </div>

  <footer>
    <span>Data stored locally</span>
    <span id="lastUpdate">—</span>
  </footer>

</div>
<script>
// ─── エラーハンドラ（画面に表示）───
window.addEventListener('error', function(e) {
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#cc3333;color:#fff;padding:12px;font-size:14px;z-index:9999;font-family:monospace;white-space:pre-wrap;';
  d.textContent = 'JSエラー: ' + e.message + '\n' + (e.filename||'') + ':' + (e.lineno||'');
  document.body.appendChild(d);
});

var PROFIT = 20, LOSS = -7, KEY = ‘portfolio_tracker_v2’;

function pad(n){ return String(n).padStart(2,‘0’); }
function esc(s){ return s.replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’); }
function fmtP(n){ return Number(n).toLocaleString(‘ja-JP’,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtI(n){ return Number(n).toLocaleString(‘ja-JP’); }
function el(id){ return document.getElementById(id); }

// 日付
var now = new Date();
el(‘dateStamp’).textContent = now.getFullYear()+’.’+pad(now.getMonth()+1)+’.’+pad(now.getDate());

// データ
var stocks = (function(){
try {
var raw = localStorage.getItem(KEY) || localStorage.getItem(‘portfolio_tracker_v1’);
if(!raw) return [];
return JSON.parse(raw).map(function(s){
return { name:s.name, buyPrice:Number(s.buyPrice), currentPrice:Number(s.currentPrice), shares:Number(s.shares)||1 };
});
} catch(e){ return []; }
})();

function save(){
localStorage.setItem(KEY, JSON.stringify(stocks));
el(‘lastUpdate’).textContent = ‘Updated ‘+pad(new Date().getHours())+’:’+pad(new Date().getMinutes());
}

function render(){
var tbody = el(‘stockBody’);
var empty = el(‘emptyState’);
tbody.innerHTML = ‘’;

if(stocks.length === 0){
empty.style.display = ‘block’;
el(‘sumCount’).textContent = el(‘sumProfit’).textContent = el(‘sumLoss’).textContent = ‘0’;
return;
}
empty.style.display = ‘none’;

var pc=0, lc=0;
stocks.forEach(function(s, idx){
var r = (s.currentPrice - s.buyPrice) / s.buyPrice * 100;
var ip = r > PROFIT, il = r < LOSS;
if(ip) pc++; if(il) lc++;

```
var tr = document.createElement('tr');
if(ip) tr.className='profit-row'; else if(il) tr.className='loss-row';

var sign = r>=0?'+':'', pc2 = r>=0?'up':'down';
var st = '監視中', sc = 'status';
if(ip){ st='利確ライン到達'; sc='status alert-profit'; }
if(il){ st='損切ライン到達'; sc='status alert-loss'; }

tr.innerHTML =
  '<td><span class="cell-pad"><span class="ticker">'+esc(s.name)+'</span></span></td>'+
  '<td class="editable-cell" data-idx="'+idx+'" data-field="buyPrice">'+
    '<span class="cell-pad cell-right"><span class="edit-icon">✎</span><span class="val">¥'+fmtP(s.buyPrice)+'</span></span>'+
    '<input class="inline-input" type="number" step="0.01" min="0.01">'+
  '</td>'+
  '<td class="editable-cell" data-idx="'+idx+'" data-field="currentPrice">'+
    '<span class="cell-pad cell-right"><span class="edit-icon">✎</span><span class="val">¥'+fmtP(s.currentPrice)+'</span></span>'+
    '<input class="inline-input" type="number" step="0.01" min="0.01">'+
  '</td>'+
  '<td class="editable-cell" data-idx="'+idx+'" data-field="shares">'+
    '<span class="cell-pad cell-right"><span class="edit-icon">✎</span><span class="val">'+fmtI(s.shares)+' 株</span></span>'+
    '<input class="inline-input" type="number" step="1" min="1">'+
  '</td>'+
  '<td><span class="cell-pad cell-right"><span class="pct '+pc2+'">'+sign+r.toFixed(2)+'%</span></span></td>'+
  '<td><span class="cell-pad"><span class="'+sc+'">'+st+'</span></span></td>'+
  '<td class="action-cell"><button class="icon-btn del-btn" data-idx="'+idx+'">×</button></td>';

// インライン編集
tr.querySelectorAll('.editable-cell').forEach(function(cell){
  cell.addEventListener('click', function(){
    if(cell.classList.contains('editing')) return;
    cell.classList.add('editing');
    var inp = cell.querySelector('.inline-input');
    var ci = parseInt(cell.dataset.idx,10), cf = cell.dataset.field;
    inp.value = stocks[ci][cf]; inp.focus(); inp.select();
    inp.onblur = function(){
      var v = cf==='shares' ? parseInt(inp.value,10) : parseFloat(inp.value);
      if(!isNaN(v) && v>0){ stocks[ci][cf]=v; save(); }
      cell.classList.remove('editing'); render();
    };
    inp.onkeydown = function(e){
      if(e.key==='Enter') inp.blur();
      if(e.key==='Escape'){ inp.onblur=null; cell.classList.remove('editing'); render(); }
    };
  });
});

// 削除
tr.querySelector('.del-btn').addEventListener('click', function(e){
  e.stopPropagation();
  var di = parseInt(e.currentTarget.dataset.idx,10);
  if(confirm('「'+stocks[di].name+'」を削除しますか？')){
    stocks.splice(di,1); save(); render();
  }
});

tbody.appendChild(tr);
```

});

el(‘sumCount’).textContent  = stocks.length;
el(‘sumProfit’).textContent = pc;
el(‘sumLoss’).textContent   = lc;
}

// 追加
el(‘addBtn’).onclick = function(){
var name = el(‘name’).value.trim();
var buy  = parseFloat(el(‘buyPrice’).value);
var cur  = parseFloat(el(‘currentPrice’).value);
var sh   = el(‘shares’).value.trim();
var shares = sh===’’ ? 1 : parseInt(sh,10);

if(!name)                  { alert(‘銘柄名を入力してください’); return; }
if(isNaN(buy)||buy<=0)     { alert(‘取得単価を入力してください’); return; }
if(isNaN(cur)||cur<=0)     { alert(‘現在株価を入力してください’); return; }
if(isNaN(shares)||shares<1){ alert(‘保有株数を入力してください’); return; }

stocks.push({ name:name, buyPrice:buy, currentPrice:cur, shares:shares });
save(); render();
el(‘name’).value=’’; el(‘buyPrice’).value=’’; el(‘currentPrice’).value=’’; el(‘shares’).value=’’;
el(‘name’).focus();
};

render();
</script>

</body>
</html>

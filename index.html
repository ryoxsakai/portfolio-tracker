<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Tracker — 利確・損切管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=IBM+Plex+Sans+JP:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --bg-elevated: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #5a5a5a;
    --ink-muted: #9a9a9a;
    --line: #e5e1d8;
    --line-soft: #efece5;
    --accent: #1a1a1a;
    --profit: #fde8e8;
    --profit-border: #f5c7c7;
    --profit-ink: #8a2b2b;
    --loss: #e3edf7;
    --loss-border: #c1d4ea;
    --loss-ink: #2a4d7a;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
background: var(–bg);
color: var(–ink);
font-family: ‘IBM Plex Sans JP’, -apple-system, sans-serif;
font-weight: 400;
line-height: 1.6;
-webkit-font-smoothing: antialiased;
min-height: 100vh;
}

body {
background-image:
radial-gradient(circle at 15% 20%, rgba(200, 180, 140, 0.08) 0%, transparent 40%),
radial-gradient(circle at 85% 80%, rgba(120, 140, 180, 0.06) 0%, transparent 40%);
}

.container {
max-width: 1100px;
margin: 0 auto;
padding: 48px 32px 80px;
}

/* ヘッダー */
header {
display: flex;
justify-content: space-between;
align-items: flex-end;
padding-bottom: 32px;
border-bottom: 1px solid var(–line);
margin-bottom: 40px;
}

.brand-mark {
font-family: ‘Fraunces’, serif;
font-weight: 300;
font-size: 13px;
letter-spacing: 0.3em;
text-transform: uppercase;
color: var(–ink-muted);
margin-bottom: 8px;
}

h1 {
font-family: ‘Fraunces’, serif;
font-weight: 400;
font-size: clamp(2rem, 4vw, 3rem);
letter-spacing: -0.02em;
line-height: 1.05;
}

h1 em {
font-style: italic;
font-weight: 300;
color: var(–ink-soft);
}

.date-stamp {
font-family: ‘JetBrains Mono’, monospace;
font-size: 12px;
color: var(–ink-muted);
letter-spacing: 0.05em;
text-align: right;
}

/* サマリーカード */
.summary {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
gap: 1px;
background: var(–line);
border: 1px solid var(–line);
margin-bottom: 48px;
}

.summary-item {
background: var(–bg-elevated);
padding: 24px 28px;
}

.summary-label {
font-size: 11px;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–ink-muted);
margin-bottom: 8px;
}

.summary-value {
font-family: ‘Fraunces’, serif;
font-size: 28px;
font-weight: 400;
letter-spacing: -0.01em;
}

.summary-value.positive { color: var(–profit-ink); }
.summary-value.negative { color: var(–loss-ink); }

/* フォーム */
.form-section {
background: var(–bg-elevated);
border: 1px solid var(–line);
padding: 32px;
margin-bottom: 40px;
position: relative;
}

.form-section::before {
content: ‘’;
position: absolute;
top: -1px;
left: -1px;
width: 24px;
height: 24px;
border-top: 2px solid var(–ink);
border-left: 2px solid var(–ink);
}

.form-title {
font-family: ‘Fraunces’, serif;
font-size: 18px;
font-weight: 500;
margin-bottom: 24px;
display: flex;
align-items: center;
gap: 12px;
}

.form-title::before {
content: ‘+’;
font-size: 24px;
font-weight: 300;
color: var(–ink-muted);
}

.form-grid {
display: grid;
grid-template-columns: 2fr 1fr 1fr auto;
gap: 16px;
align-items: end;
}

@media (max-width: 720px) {
.form-grid { grid-template-columns: 1fr; }
}

.field label {
display: block;
font-size: 11px;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–ink-muted);
margin-bottom: 8px;
}

.field input {
width: 100%;
border: none;
border-bottom: 1px solid var(–line);
background: transparent;
padding: 10px 0;
font-size: 15px;
font-family: inherit;
color: var(–ink);
transition: border-color 0.2s;
}

.field input:focus {
outline: none;
border-bottom-color: var(–ink);
}

.field input[type=“number”] {
font-family: ‘JetBrains Mono’, monospace;
}

button.primary {
background: var(–ink);
color: var(–bg);
border: none;
padding: 12px 28px;
font-size: 13px;
letter-spacing: 0.1em;
text-transform: uppercase;
font-family: inherit;
cursor: pointer;
transition: all 0.25s;
position: relative;
white-space: nowrap;
}

button.primary:hover {
background: var(–bg);
color: var(–ink);
box-shadow: inset 0 0 0 1px var(–ink);
}

button.primary:active { transform: translateY(1px); }

/* 凡例 */
.legend {
display: flex;
gap: 24px;
margin-bottom: 20px;
font-size: 12px;
color: var(–ink-soft);
flex-wrap: wrap;
}

.legend-item {
display: flex;
align-items: center;
gap: 8px;
}

.swatch {
width: 14px;
height: 14px;
border: 1px solid;
display: inline-block;
}

.swatch.profit { background: var(–profit); border-color: var(–profit-border); }
.swatch.loss { background: var(–loss); border-color: var(–loss-border); }

/* テーブル */
.table-wrap {
background: var(–bg-elevated);
border: 1px solid var(–line);
overflow-x: auto;
}

table {
width: 100%;
border-collapse: collapse;
min-width: 640px;
}

thead th {
text-align: left;
padding: 18px 20px;
font-size: 11px;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–ink-muted);
font-weight: 500;
border-bottom: 1px solid var(–line);
background: var(–line-soft);
}

thead th.num { text-align: right; }

tbody td {
padding: 20px;
border-bottom: 1px solid var(–line-soft);
font-size: 15px;
vertical-align: middle;
}

tbody tr:last-child td { border-bottom: none; }

tbody tr {
transition: background-color 0.3s;
}

tbody tr.profit-row {
background: var(–profit);
}
tbody tr.profit-row td:first-child {
border-left: 3px solid var(–profit-border);
padding-left: 17px;
}

tbody tr.loss-row {
background: var(–loss);
}
tbody tr.loss-row td:first-child {
border-left: 3px solid var(–loss-border);
padding-left: 17px;
}

.ticker {
font-family: ‘Fraunces’, serif;
font-size: 17px;
font-weight: 500;
}

.num {
text-align: right;
font-family: ‘JetBrains Mono’, monospace;
font-variant-numeric: tabular-nums;
font-size: 14px;
}

.pct {
font-family: ‘JetBrains Mono’, monospace;
font-size: 13px;
padding: 3px 10px;
border: 1px solid var(–line);
display: inline-block;
min-width: 72px;
text-align: center;
}

.pct.up {
background: var(–profit);
color: var(–profit-ink);
border-color: var(–profit-border);
}

.pct.down {
background: var(–loss);
color: var(–loss-ink);
border-color: var(–loss-border);
}

.status {
font-size: 11px;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–ink-muted);
}

.status.alert-profit { color: var(–profit-ink); font-weight: 500; }
.status.alert-loss { color: var(–loss-ink); font-weight: 500; }

button.icon-btn {
background: transparent;
border: 1px solid var(–line);
color: var(–ink-soft);
width: 32px;
height: 32px;
cursor: pointer;
font-size: 14px;
font-family: inherit;
transition: all 0.2s;
display: inline-flex;
align-items: center;
justify-content: center;
}

button.icon-btn:hover {
border-color: var(–ink);
color: var(–ink);
background: var(–bg);
}

.empty {
padding: 80px 20px;
text-align: center;
color: var(–ink-muted);
}

.empty-mark {
font-family: ‘Fraunces’, serif;
font-style: italic;
font-size: 22px;
margin-bottom: 8px;
color: var(–ink-soft);
}

.empty-sub {
font-size: 13px;
letter-spacing: 0.05em;
}

/* フッター */
footer {
margin-top: 48px;
padding-top: 24px;
border-top: 1px solid var(–line);
display: flex;
justify-content: space-between;
font-size: 11px;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–ink-muted);
}

/* アニメーション */
@keyframes fadeIn {
from { opacity: 0; transform: translateY(4px); }
to { opacity: 1; transform: translateY(0); }
}

tbody tr {
animation: fadeIn 0.3s ease-out;
}

/* スクロールバー */
.table-wrap::-webkit-scrollbar { height: 8px; }
.table-wrap::-webkit-scrollbar-track { background: var(–line-soft); }
.table-wrap::-webkit-scrollbar-thumb { background: var(–ink-muted); }
</style>

</head>
<body>

<div class="container">

  <header>
    <div>
      <div class="brand-mark">Portfolio Tracker</div>
      <h1>利確・損切 <em>Monitor</em></h1>
    </div>
    <div class="date-stamp" id="dateStamp"></div>
  </header>

  <section class="summary" id="summary">
    <div class="summary-item">
      <div class="summary-label">Holdings</div>
      <div class="summary-value" id="sumCount">0</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Take Profit (+20%)</div>
      <div class="summary-value positive" id="sumProfit">0</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Stop Loss (-7%)</div>
      <div class="summary-value negative" id="sumLoss">0</div>
    </div>
  </section>

  <section class="form-section">
    <div class="form-title">新規登録</div>
    <form id="stockForm" class="form-grid" autocomplete="off">
      <div class="field">
        <label for="name">銘柄名 / Ticker</label>
        <input type="text" id="name" required placeholder="例：トヨタ自動車">
      </div>
      <div class="field">
        <label for="buyPrice">取得単価</label>
        <input type="number" id="buyPrice" step="0.01" min="0.01" required placeholder="0.00">
      </div>
      <div class="field">
        <label for="currentPrice">現在株価</label>
        <input type="number" id="currentPrice" step="0.01" min="0.01" required placeholder="0.00">
      </div>
      <button type="submit" class="primary">追加</button>
    </form>
  </section>

  <div class="legend">
    <div class="legend-item"><span class="swatch profit"></span>利確ライン（+20%超）</div>
    <div class="legend-item"><span class="swatch loss"></span>損切ライン（-7%下回）</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>銘柄</th>
          <th class="num">取得単価</th>
          <th class="num">現在株価</th>
          <th class="num">損益率</th>
          <th>ステータス</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="stockBody"></tbody>
    </table>
    <div id="emptyState" class="empty" style="display:none;">
      <div class="empty-mark">— No holdings yet —</div>
      <div class="empty-sub">上のフォームから最初の銘柄を登録してください</div>
    </div>
  </div>

  <footer>
    <span>Data stored locally</span>
    <span id="lastUpdate">—</span>
  </footer>

</div>

<script>
  const STORAGE_KEY = 'portfolio_tracker_v1';
  const PROFIT_THRESHOLD = 20;  // +20%
  const LOSS_THRESHOLD = -7;    // -7%

  const $ = (id) => document.getElementById(id);
  const form = $('stockForm');
  const body = $('stockBody');
  const emptyState = $('emptyState');

  // 日付表示
  const now = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  $('dateStamp').textContent =
    `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;

  // データ読み込み
  let stocks = loadStocks();

  function loadStocks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      console.warn('データの読み込みに失敗:', e);
      return [];
    }
  }

  function saveStocks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(stocks));
    $('lastUpdate').textContent =
      `Updated ${pad(new Date().getHours())}:${pad(new Date().getMinutes())}`;
  }

  function calcRate(buy, current) {
    return ((current - buy) / buy) * 100;
  }

  function formatNum(n) {
    return n.toLocaleString('ja-JP', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function render() {
    body.innerHTML = '';

    if (stocks.length === 0) {
      emptyState.style.display = 'block';
    } else {
      emptyState.style.display = 'none';
    }

    let profitCount = 0;
    let lossCount = 0;

    stocks.forEach((s, idx) => {
      const rate = calcRate(s.buyPrice, s.currentPrice);
      const isProfit = rate > PROFIT_THRESHOLD;
      const isLoss = rate < LOSS_THRESHOLD;

      if (isProfit) profitCount++;
      if (isLoss) lossCount++;

      const tr = document.createElement('tr');
      if (isProfit) tr.className = 'profit-row';
      else if (isLoss) tr.className = 'loss-row';

      const sign = rate >= 0 ? '+' : '';
      const pctClass = rate >= 0 ? 'up' : 'down';

      let status = '—';
      let statusClass = 'status';
      if (isProfit) {
        status = '利確ライン到達';
        statusClass = 'status alert-profit';
      } else if (isLoss) {
        status = '損切ライン到達';
        statusClass = 'status alert-loss';
      } else {
        status = '監視中';
      }

      tr.innerHTML = `
        <td><span class="ticker">${escapeHtml(s.name)}</span></td>
        <td class="num">¥${formatNum(s.buyPrice)}</td>
        <td class="num">¥${formatNum(s.currentPrice)}</td>
        <td class="num"><span class="pct ${pctClass}">${sign}${rate.toFixed(2)}%</span></td>
        <td><span class="${statusClass}">${status}</span></td>
        <td class="num"><button class="icon-btn" data-idx="${idx}" title="削除">×</button></td>
      `;
      body.appendChild(tr);
    });

    $('sumCount').textContent = stocks.length;
    $('sumProfit').textContent = profitCount;
    $('sumLoss').textContent = lossCount;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // フォーム送信
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = $('name').value.trim();
    const buyPrice = parseFloat($('buyPrice').value);
    const currentPrice = parseFloat($('currentPrice').value);

    if (!name || isNaN(buyPrice) || isNaN(currentPrice) || buyPrice <= 0 || currentPrice <= 0) {
      return;
    }

    stocks.push({ name, buyPrice, currentPrice });
    saveStocks();
    render();
    form.reset();
    $('name').focus();
  });

  // 削除
  body.addEventListener('click', (e) => {
    const btn = e.target.closest('.icon-btn');
    if (!btn) return;
    const idx = parseInt(btn.dataset.idx, 10);
    if (!isNaN(idx)) {
      if (confirm(`「${stocks[idx].name}」を削除しますか？`)) {
        stocks.splice(idx, 1);
        saveStocks();
        render();
      }
    }
  });

  render();
</script>

</body>
</html>

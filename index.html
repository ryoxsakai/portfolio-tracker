<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Portfolio Tracker — 利確・損切管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=IBM+Plex+Sans+JP:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #16181d;
    --bg-elevated:   #1e2028;
    --bg-card:       #22252e;
    --bg-input:      #2a2d38;
    --ink:           #e8e6e0;
    --ink-soft:      #9a98a0;
    --ink-muted:     #5a5860;
    --line:          #2e3040;
    --line-soft:     #262830;
    --profit:        rgba(160, 60, 60, 0.18);
    --profit-border: rgba(200, 80, 80, 0.35);
    --profit-ink:    #f08080;
    --loss:          rgba(50, 90, 160, 0.18);
    --loss-border:   rgba(70, 120, 200, 0.35);
    --loss-ink:      #7aaef0;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
color-scheme: dark;
background: #16181d;
color: #e8e6e0;
font-family: ‘IBM Plex Sans JP’, -apple-system, sans-serif;
font-weight: 400;
line-height: 1.6;
-webkit-font-smoothing: antialiased;
min-height: 100vh;
}

html { background: #16181d; }

body {
background: #16181d;
background-image:
radial-gradient(ellipse at 10% 0%, rgba(80, 60, 130, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 90% 100%, rgba(30, 80, 140, 0.10) 0%, transparent 50%);
}

.container {
max-width: 1100px;
margin: 0 auto;
padding: 48px 32px 80px;
}

/* ヘッダー */
header {
display: flex;
justify-content: space-between;
align-items: flex-end;
padding-bottom: 32px;
border-bottom: 1px solid #2e3040;
margin-bottom: 40px;
}

.brand-mark {
font-family: ‘Fraunces’, serif;
font-weight: 300;
font-size: 12px;
letter-spacing: 0.3em;
text-transform: uppercase;
color: #5a5860;
margin-bottom: 8px;
}

h1 {
font-family: ‘Fraunces’, serif;
font-weight: 400;
font-size: clamp(2rem, 4vw, 2.8rem);
letter-spacing: -0.02em;
line-height: 1.05;
color: #e8e6e0;
}

h1 em {
font-style: italic;
font-weight: 300;
color: #9a98a0;
}

.date-stamp {
font-family: ‘JetBrains Mono’, monospace;
font-size: 12px;
color: #5a5860;
letter-spacing: 0.05em;
text-align: right;
}

/* サマリーカード */
.summary {
display: grid;
grid-template-columns: repeat(3, 1fr);
background: #22252e;
border: 1px solid #2e3040;
margin-bottom: 40px;
}

.summary-item {
padding: 22px 24px;
border-right: 1px solid #2e3040;
}

.summary-item:last-child { border-right: none; }

.summary-label {
font-size: 10px;
letter-spacing: 0.14em;
text-transform: uppercase;
color: #5a5860;
margin-bottom: 6px;
}

.summary-value {
font-family: ‘Fraunces’, serif;
font-size: 26px;
font-weight: 400;
letter-spacing: -0.01em;
color: #e8e6e0;
}

.summary-value.positive { color: #f08080; }
.summary-value.negative { color: #7aaef0; }

/* フォーム */
.form-section {
background: #22252e;
border: 1px solid #2e3040;
padding: 28px 32px;
margin-bottom: 32px;
position: relative;
}

.form-section::before {
content: ‘’;
position: absolute;
top: -1px; left: -1px;
width: 20px; height: 20px;
border-top: 2px solid #e8e6e0;
border-left: 2px solid #e8e6e0;
}

.form-title {
font-family: ‘Fraunces’, serif;
font-size: 16px;
font-weight: 500;
margin-bottom: 20px;
color: #9a98a0;
display: flex;
align-items: center;
gap: 10px;
}

.form-title::before {
content: ‘+’;
font-size: 22px;
font-weight: 300;
color: #5a5860;
}

.form-grid {
display: grid;
grid-template-columns: 2fr 1fr 1fr 1fr auto;
gap: 16px;
align-items: end;
}

.field label {
display: block;
font-size: 10px;
letter-spacing: 0.1em;
text-transform: uppercase;
color: #5a5860;
margin-bottom: 8px;
}

.field input {
width: 100%;
border: none;
border-bottom: 1px solid #2e3040;
background: transparent;
padding: 8px 0;
font-size: 16px;
font-family: inherit;
color: #e8e6e0;
transition: border-color 0.2s;
}

.field input:focus {
outline: none;
border-bottom-color: #9a98a0;
}

.field input[type=“number”] {
font-family: ‘JetBrains Mono’, monospace;
}

button.primary {
-webkit-appearance: none;
appearance: none;
background: #3a3d4a;
color: #e8e6e0;
border: none;
padding: 10px 24px;
font-size: 12px;
letter-spacing: 0.1em;
text-transform: uppercase;
font-family: inherit;
cursor: pointer;
transition: background 0.2s;
white-space: nowrap;
}

button.primary:hover { background: #4a4e60; }
button.primary:active { opacity: 0.8; }

/* 凡例 */
.legend {
display: flex;
gap: 20px;
margin-bottom: 16px;
font-size: 12px;
color: #9a98a0;
flex-wrap: wrap;
align-items: center;
}

.legend-item {
display: flex;
align-items: center;
gap: 7px;
}

.swatch {
width: 12px; height: 12px;
border: 1px solid;
display: inline-block;
flex-shrink: 0;
}

.swatch.profit { background: rgba(160,60,60,0.18); border-color: rgba(200,80,80,0.35); }
.swatch.loss   { background: rgba(50,90,160,0.18); border-color: rgba(70,120,200,0.35); }

/* テーブル */
.table-wrap {
background: #22252e;
border: 1px solid #2e3040;
overflow-x: auto;
}

table {
width: 100%;
border-collapse: collapse;
min-width: 720px;
}

thead th {
text-align: left;
padding: 14px 16px;
font-size: 10px;
letter-spacing: 0.12em;
text-transform: uppercase;
color: #5a5860;
font-weight: 500;
border-bottom: 1px solid #2e3040;
background: #1e2028;
}

thead th.num { text-align: right; }

tbody td {
border-bottom: 1px solid #262830;
vertical-align: middle;
padding: 0;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background-color 0.3s; }

tbody tr.profit-row { background: rgba(160,60,60,0.18); }
tbody tr.profit-row td:first-child { border-left: 3px solid rgba(200,80,80,0.55); }

tbody tr.loss-row { background: rgba(50,90,160,0.18); }
tbody tr.loss-row td:first-child { border-left: 3px solid rgba(70,120,200,0.55); }

/* セル内パディング（spanで統一） */
.cell-pad {
display: flex;
align-items: center;
padding: 16px;
}

.cell-right {
justify-content: flex-end;
}

.ticker {
font-family: ‘Fraunces’, serif;
font-size: 16px;
font-weight: 500;
}

/* インライン編集セル */
.editable-cell { cursor: pointer; }

.editable-cell .cell-pad {
justify-content: flex-end;
gap: 6px;
}

.edit-icon {
opacity: 0;
font-size: 10px;
color: #5a5860;
transition: opacity 0.15s;
flex-shrink: 0;
user-select: none;
}

.editable-cell:hover .edit-icon,
.editable-cell:focus .edit-icon { opacity: 1; }

.val {
font-family: ‘JetBrains Mono’, monospace;
font-variant-numeric: tabular-nums;
font-size: 13px;
}

.inline-input {
display: none;
width: 100%;
background: #2a2d38;
border: 1px solid #9a98a0;
color: #e8e6e0;
font-family: ‘JetBrains Mono’, monospace;
font-size: 13px;
padding: 8px 12px;
outline: none;
text-align: right;
margin: 4px 12px;
box-sizing: border-box;
width: calc(100% - 24px);
}

.editable-cell.editing .cell-pad  { display: none; }
.editable-cell.editing .inline-input { display: block; }

/* 損益率バッジ */
.pct {
font-family: ‘JetBrains Mono’, monospace;
font-size: 12px;
padding: 3px 8px;
border: 1px solid #2e3040;
display: inline-block;
min-width: 68px;
text-align: center;
}

.pct.up   { background: rgba(160,60,60,0.18); color: #f08080; border-color: rgba(200,80,80,0.35); }
.pct.down { background: rgba(50,90,160,0.18); color: #7aaef0; border-color: rgba(70,120,200,0.35); }

.status {
font-size: 10px;
letter-spacing: 0.08em;
text-transform: uppercase;
color: #5a5860;
}

.status.alert-profit { color: #f08080; font-weight: 600; }
.status.alert-loss   { color: #7aaef0; font-weight: 600; }

/* 削除ボタン */
.action-cell {
padding: 0 12px;
text-align: right;
white-space: nowrap;
}

button.icon-btn {
-webkit-appearance: none;
appearance: none;
background: transparent;
border: 1px solid #2e3040;
color: #5a5860;
width: 28px; height: 28px;
cursor: pointer;
font-size: 14px;
transition: all 0.2s;
display: inline-flex;
align-items: center;
justify-content: center;
}

button.icon-btn:hover {
border-color: #9a98a0;
color: #e8e6e0;
}

/* empty state */
.empty {
padding: 70px 20px;
text-align: center;
color: #5a5860;
}

.empty-mark {
font-family: ‘Fraunces’, serif;
font-style: italic;
font-size: 20px;
margin-bottom: 6px;
color: #9a98a0;
}

.empty-sub { font-size: 13px; }

/* フッター */
footer {
margin-top: 40px;
padding-top: 20px;
border-top: 1px solid #2e3040;
display: flex;
justify-content: space-between;
font-size: 10px;
letter-spacing: 0.1em;
text-transform: uppercase;
color: #5a5860;
}

/* アニメーション */
@keyframes fadeIn {
from { opacity: 0; transform: translateY(3px); }
to   { opacity: 1; transform: translateY(0); }
}

tbody tr { animation: fadeIn 0.25s ease-out; }

.table-wrap::-webkit-scrollbar { height: 6px; }
.table-wrap::-webkit-scrollbar-track { background: #1e2028; }
.table-wrap::-webkit-scrollbar-thumb { background: #5a5860; }

/* ===== モバイル ===== */
@media (max-width: 720px) {
.container { padding: 24px 14px 60px; }

```
header { flex-direction: column; align-items: flex-start; gap: 6px; }
.date-stamp { text-align: left; }

.summary-item  { padding: 14px 10px; }
.summary-value { font-size: 20px; }
.summary-label { font-size: 9px; }

.form-section { padding: 18px 14px; }

.form-grid {
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-grid .field:first-child  { grid-column: 1 / -1; }
.form-grid button.primary {
  grid-column: 1 / -1;
  width: 100%;
  padding: 13px;
}
```

}
</style>

</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="brand-mark">Portfolio Tracker</div>
      <h1>利確・損切 <em>Monitor</em></h1>
    </div>
    <div class="date-stamp" id="dateStamp"></div>
  </header>

  <section class="summary">
    <div class="summary-item">
      <div class="summary-label">Holdings</div>
      <div class="summary-value" id="sumCount">0</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Take Profit (+20%)</div>
      <div class="summary-value positive" id="sumProfit">0</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Stop Loss (−7%)</div>
      <div class="summary-value negative" id="sumLoss">0</div>
    </div>
  </section>

  <section class="form-section">
    <div class="form-title">新規登録</div>
    <div id="stockForm" class="form-grid">
      <div class="field">
        <label for="name">銘柄名 / Ticker</label>
        <input type="text" id="name" required placeholder="例：トヨタ自動車">
      </div>
      <div class="field">
        <label for="buyPrice">取得単価</label>
        <input type="number" id="buyPrice" step="0.01" min="0.01" required placeholder="0.00">
      </div>
      <div class="field">
        <label for="currentPrice">現在株価</label>
        <input type="number" id="currentPrice" step="0.01" min="0.01" required placeholder="0.00">
      </div>
      <div class="field">
        <label for="shares">保有株数</label>
        <input type="number" id="shares" step="1" min="1" placeholder="100（省略可）">
      </div>
      <button type="button" id="addBtn" class="primary">追加</button>
    </div>
  </section>

  <div class="legend">
    <div class="legend-item"><span class="swatch profit"></span>利確ライン（+20%超）</div>
    <div class="legend-item"><span class="swatch loss"></span>損切ライン（−7%下回）</div>
    <div class="legend-item" style="color:#5a5860;font-size:11px;">✎ 数値をタップ／クリックで直接編集できます</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>銘柄</th>
          <th class="num">取得単価</th>
          <th class="num">現在株価</th>
          <th class="num">保有株数</th>
          <th class="num">損益率</th>
          <th>ステータス</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="stockBody"></tbody>
    </table>
    <div id="emptyState" class="empty" style="display:none;">
      <div class="empty-mark">— No holdings yet —</div>
      <div class="empty-sub">上のフォームから最初の銘柄を登録してください</div>
    </div>
  </div>

  <footer>
    <span>Data stored locally</span>
    <span id="lastUpdate">—</span>
  </footer>

</div>
<script>
  const STORAGE_KEY      = 'portfolio_tracker_v2';
  const PROFIT_THRESHOLD = 20;
  const LOSS_THRESHOLD   = -7;

const pad = n => String(n).padStart(2, ‘0’);
const now = new Date();
document.getElementById(‘dateStamp’).textContent =
now.getFullYear() + ‘.’ + pad(now.getMonth()+1) + ‘.’ + pad(now.getDate());

// データ読み込み
function loadData() {
try {
var raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(‘portfolio_tracker_v1’);
var arr = raw ? JSON.parse(raw) : [];
return arr.map(function(s) { return { shares: 1, name: s.name, buyPrice: s.buyPrice, currentPrice: s.currentPrice, shares: s.shares || 1 }; });
} catch(e) { return []; }
}

var stocks = loadData();

function save() {
localStorage.setItem(STORAGE_KEY, JSON.stringify(stocks));
document.getElementById(‘lastUpdate’).textContent =
’Updated ’ + pad(new Date().getHours()) + ‘:’ + pad(new Date().getMinutes());
}

function esc(str) {
return str.replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’);
}

function fmtPrice(n) {
return Number(n).toLocaleString(‘ja-JP’, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtInt(n) {
return Number(n).toLocaleString(‘ja-JP’);
}

function render() {
var tbody   = document.getElementById(‘stockBody’);
var emptyEl = document.getElementById(‘emptyState’);
tbody.innerHTML = ‘’;

```
if (stocks.length === 0) {
  emptyEl.style.display = 'block';
  document.getElementById('sumCount').textContent  = 0;
  document.getElementById('sumProfit').textContent = 0;
  document.getElementById('sumLoss').textContent   = 0;
  return;
}
emptyEl.style.display = 'none';

var profitCount = 0, lossCount = 0;

for (var i = 0; i < stocks.length; i++) {
  (function(idx) {
    var s = stocks[idx];
    var r = ((s.currentPrice - s.buyPrice) / s.buyPrice) * 100;
    var isProfit = r > PROFIT_THRESHOLD;
    var isLoss   = r < LOSS_THRESHOLD;
    if (isProfit) profitCount++;
    if (isLoss)   lossCount++;

    var sign     = r >= 0 ? '+' : '';
    var pctClass = r >= 0 ? 'up' : 'down';
    var statusText  = '監視中';
    var statusClass = 'status';
    if (isProfit) { statusText = '利確ライン到達'; statusClass = 'status alert-profit'; }
    if (isLoss)   { statusText = '損切ライン到達'; statusClass = 'status alert-loss'; }

    var tr = document.createElement('tr');
    if (isProfit)    tr.className = 'profit-row';
    else if (isLoss) tr.className = 'loss-row';

    tr.innerHTML =
      '<td><span class="cell-pad"><span class="ticker">' + esc(s.name) + '</span></span></td>' +
      '<td class="editable-cell" data-idx="' + idx + '" data-field="buyPrice">' +
        '<span class="cell-pad cell-right"><span class="edit-icon">✎</span><span class="val">¥' + fmtPrice(s.buyPrice) + '</span></span>' +
        '<input class="inline-input" type="number" step="0.01" min="0.01">' +
      '</td>' +
      '<td class="editable-cell" data-idx="' + idx + '" data-field="currentPrice">' +
        '<span class="cell-pad cell-right"><span class="edit-icon">✎</span><span class="val">¥' + fmtPrice(s.currentPrice) + '</span></span>' +
        '<input class="inline-input" type="number" step="0.01" min="0.01">' +
      '</td>' +
      '<td class="editable-cell" data-idx="' + idx + '" data-field="shares">' +
        '<span class="cell-pad cell-right"><span class="edit-icon">✎</span><span class="val">' + fmtInt(s.shares) + ' 株</span></span>' +
        '<input class="inline-input" type="number" step="1" min="1">' +
      '</td>' +
      '<td><span class="cell-pad cell-right"><span class="pct ' + pctClass + '">' + sign + r.toFixed(2) + '%</span></span></td>' +
      '<td><span class="cell-pad"><span class="' + statusClass + '">' + statusText + '</span></span></td>' +
      '<td class="action-cell"><button class="icon-btn del-btn" data-idx="' + idx + '">×</button></td>';

    // インライン編集
    var editCells = tr.querySelectorAll('.editable-cell');
    for (var j = 0; j < editCells.length; j++) {
      editCells[j].addEventListener('click', (function(cell) {
        return function() {
          if (cell.classList.contains('editing')) return;
          cell.classList.add('editing');
          var input = cell.querySelector('.inline-input');
          var cellIdx   = parseInt(cell.dataset.idx, 10);
          var cellField = cell.dataset.field;
          input.value = stocks[cellIdx][cellField];
          input.focus();
          input.select();

          function commit() {
            var v = cellField === 'shares' ? parseInt(input.value, 10) : parseFloat(input.value);
            if (!isNaN(v) && v > 0) { stocks[cellIdx][cellField] = v; save(); }
            cell.classList.remove('editing');
            render();
          }
          input.onblur = commit;
          input.onkeydown = function(e) {
            if (e.key === 'Enter')  { input.blur(); }
            if (e.key === 'Escape') { input.onblur = null; cell.classList.remove('editing'); render(); }
          };
        };
      })(editCells[j]));
    }

    // 削除ボタン
    tr.querySelector('.del-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      var di = parseInt(e.currentTarget.dataset.idx, 10);
      if (confirm('「' + stocks[di].name + '」を削除しますか？')) {
        stocks.splice(di, 1);
        save();
        render();
      }
    });

    tbody.appendChild(tr);
  })(i);
}

document.getElementById('sumCount').textContent  = stocks.length;
document.getElementById('sumProfit').textContent = profitCount;
document.getElementById('sumLoss').textContent   = lossCount;
```

}

// 追加処理
function addStock() {
var name         = document.getElementById(‘name’).value.trim();
var buyPrice     = parseFloat(document.getElementById(‘buyPrice’).value);
var currentPrice = parseFloat(document.getElementById(‘currentPrice’).value);
var sharesVal    = document.getElementById(‘shares’).value.trim();
var shares       = sharesVal === ‘’ ? 1 : parseInt(sharesVal, 10);

```
alert('DEBUG: name=' + name + ' buy=' + buyPrice + ' cur=' + currentPrice + ' shares=' + shares);

if (!name)                             { alert('銘柄名を入力してください'); return; }
if (isNaN(buyPrice) || buyPrice <= 0)  { alert('取得単価を入力してください'); return; }
if (isNaN(currentPrice) || currentPrice <= 0) { alert('現在株価を入力してください'); return; }
if (isNaN(shares) || shares <= 0)      { alert('保有株数を正しく入力してください'); return; }

stocks.push({ name: name, buyPrice: buyPrice, currentPrice: currentPrice, shares: shares });
save();
render();
document.getElementById('name').value         = '';
document.getElementById('buyPrice').value     = '';
document.getElementById('currentPrice').value = '';
document.getElementById('shares').value       = '';
document.getElementById('name').focus();
```

}

// イベント登録
document.getElementById(‘addBtn’).addEventListener(‘click’, function(e) {
e.preventDefault();
addStock();
});

render();
</script>

</body>
